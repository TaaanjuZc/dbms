<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — notown</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-page {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%, rgba(85,75,249,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(180,240,69,0.06) 0%, transparent 55%),
        var(--bg);
    }
    .auth-glass {
      background: rgba(var(--bg-rgb), 0.6);
      backdrop-filter: blur(48px) saturate(2);
      -webkit-backdrop-filter: blur(48px) saturate(2);
      border: 1px solid var(--surface-border);
      border-radius: var(--r-2xl);
      padding: 2.25rem;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .auth-logo {
      text-align: center; margin-bottom: 1.75rem;
      font-size: 1.75rem; font-weight: 700; letter-spacing: -0.04em;
    }
    .auth-logo .no   { color: #554BF9; }
    .auth-logo .town { color: #B4F045; }

    .input-icon-wrap { position: relative; }
    .input-icon-wrap .form-control { padding-left: 2.5rem; }
    .input-icon-left {
      position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
      display: flex; align-items: center;
    }
    .input-icon-right {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center;
      background: none; border: none; padding: 0;
    }
    .input-icon-right:hover { color: var(--fg); }
    .input-icon-wrap .form-control.has-right { padding-right: 2.5rem; }

    .auth-footer-link { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--muted); }
    .auth-footer-link a { color: var(--purple); font-weight: 600; }
  </style>
</head>
<body>

<header class="navbar">
  <div class="wrap">
    <nav class="nav-inner">
      <a href="index.html" class="nav-logo"><div class="nav-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div><span class="nav-logo-text"><span class="ewu">EWU</span> <span class="notes">Notes</span><span class="hub">Hub</span></span></a>
      <div class="nav-links">
        <a href="index.html"     class="nav-link">Home</a>
        <a href="upload.html"    class="nav-link">Contribute</a>
        <a href="download.html"  class="nav-link">Explore</a>
        <a href="reviews.html"   class="nav-link">Community</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
      </div>
      <div class="nav-right">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
        <button class="nav-signin" id="nav-login" onclick="location.href='auth.html'">Sign in</button>
        <div id="nav-user" style="display:none;align-items:center;gap:0.5rem">
          <a href="dashboard.html" class="nav-user-pill">
            <div class="nav-avatar" id="nav-avatar">U</div>
            <span id="nav-username" style="font-size:0.875rem;font-weight:600"></span>
          </a>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
        </div>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </nav>
  </div>
</header>
<nav class="mobile-drawer" id="mobile-drawer">
  <button class="mobile-drawer-close" id="drawer-close"></button>
  <a href="index.html"     class="mobile-link">Home</a>
  <a href="upload.html"    class="mobile-link">Contribute</a>
  <a href="download.html"  class="mobile-link">Explore</a>
  <a href="reviews.html"   class="mobile-link">Community</a>
  <a href="dashboard.html" class="mobile-link">Dashboard</a>
</nav>

<main class="auth-page">
  <div class="auth-glass anim-scale-in">
    <div class="auth-logo">
      <span class="ewu">EWU</span> <span class="notes">Notes</span><span class="hub">Hub</span>
    </div>

    <!-- Tab switcher -->
    <div class="tab-bar" style="margin-bottom:1.5rem">
      <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create account</button>
    </div>

    <!-- Sign In form -->
    <form id="signin-form" novalidate style="display:flex;flex-direction:column;gap:1rem">
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-icon-wrap">
          <span class="input-icon-left" id="icon-mail-1"></span>
          <input type="email" class="form-control" id="si-email" placeholder="you@university.edu" autocomplete="email" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon-left" id="icon-lock-1"></span>
          <input type="password" class="form-control has-right" id="si-pass" placeholder="Your password" autocomplete="current-password" required />
          <button type="button" class="input-icon-right" id="eye-si"></button>
        </div>
      </div>
      <div class="form-error" id="si-err"></div>
      <button type="submit" class="btn btn-solid btn-full" id="si-btn" style="margin-top:0.25rem">Sign in</button>
      <p class="auth-footer-link">No account? <a href="#" onclick="switchTab('signup');return false">Create one free</a></p>
    </form>

    <!-- Sign Up form -->
    <form id="signup-form" novalidate style="display:none;flex-direction:column;gap:1rem">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <span class="input-icon-left" id="icon-user-1"></span>
          <input type="text" class="form-control" id="su-name" placeholder="Choose a username" autocomplete="username" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-icon-wrap">
          <span class="input-icon-left" id="icon-mail-2"></span>
          <input type="email" class="form-control" id="su-email" placeholder="you@university.edu" autocomplete="email" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon-left" id="icon-lock-2"></span>
          <input type="password" class="form-control has-right" id="su-pass" placeholder="At least 6 characters" autocomplete="new-password" required />
          <button type="button" class="input-icon-right" id="eye-su"></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <div class="input-icon-wrap">
          <span class="input-icon-left" id="icon-lock-3"></span>
          <input type="password" class="form-control" id="su-confirm" placeholder="Repeat password" autocomplete="new-password" required />
        </div>
      </div>
      <div class="form-error" id="su-err"></div>
      <button type="submit" class="btn btn-solid btn-full" id="su-btn" style="margin-top:0.25rem">Create account</button>
      <p class="auth-footer-link">Already have an account? <a href="#" onclick="switchTab('signin');return false">Sign in</a></p>
    </form>
  </div>
</main>

<div id="toast-rack"></div>
<script src="assets/js/main.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
